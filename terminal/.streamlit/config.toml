[server]
headless = true
enableCORS = false
enableXsrfProtection = false
enableStaticServing = true
enableWebsocketCompression = false
maxUploadSize = 50

[client]
toolbarMode = "minimal"
showErrorDetails = true

[logger]
level = "warning"

[browser]
gatherUsageStats = false

[theme]
base = "dark"
backgroundColor = "#000000"
secondaryBackgroundColor = "#0a0a0a"
textColor = "#00ff41"
primaryColor = "#00ff41"
font = "monospace"
